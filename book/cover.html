<!-- PyWhy Book Cover — full B5 page (176×250mm) -->
<div class="book-cover">

  <!-- 좌측 4레벨 컬러 띠 (페이지 정체성 강화) -->
  <div class="book-cover-spine" aria-hidden="true">
    <span class="spine-band band-elem"></span>
    <span class="spine-band band-inter"></span>
    <span class="spine-band band-adv"></span>
    <span class="spine-band band-expert"></span>
  </div>

  <!-- 우하단 거대 ? 워터마크 (강화) -->
  <div class="book-cover-watermark" aria-hidden="true">?</div>

  <!-- 좌상단 비트 패턴 ('A' = 65 = 01000001) -->
  <div class="book-cover-bitstrip" aria-hidden="true">
    <span class="bit zero">0</span>
    <span class="bit one">1</span>
    <span class="bit zero">0</span>
    <span class="bit zero">0</span>
    <span class="bit zero">0</span>
    <span class="bit zero">0</span>
    <span class="bit zero">0</span>
    <span class="bit one">1</span>
  </div>
  <div class="book-cover-bitstrip-label" aria-hidden="true">'A' = 65 = 01000001</div>

  <!-- 저자 표기 (가운데 0은 숫자 영) -->
  <div class="book-cover-author-strip">
    <span class="book-cover-author">H<span class="zero">0</span>NG</span>
    <span class="book-cover-author-rule"></span>
  </div>

  <!-- 우측 큰 LEGB 동심원 모티브 (메인 비주얼 hook) -->
  <svg class="book-cover-orbit" aria-hidden="true" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="cover-orbit-glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fdf3ec" stop-opacity="0.95"/>
        <stop offset="80%" stop-color="#fdf3ec" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="60" cy="60" r="58" fill="url(#cover-orbit-glow)"/>
    <circle cx="60" cy="60" r="56" fill="none" stroke="#5a48c0" stroke-width="0.65" opacity="0.55"/>
    <circle cx="60" cy="60" r="42" fill="none" stroke="#c45858" stroke-width="0.65" opacity="0.6"/>
    <circle cx="60" cy="60" r="28" fill="none" stroke="#c48b2c" stroke-width="0.7" opacity="0.65"/>
    <circle cx="60" cy="60" r="14" fill="none" stroke="#3b9b6e" stroke-width="0.85" opacity="0.75"/>
    <circle cx="60" cy="60" r="4.5" fill="#c4724e"/>
    <text x="60" y="9" text-anchor="middle" font-family="Noto Sans CJK KR" font-size="5.8" fill="#5a48c0" font-weight="700" letter-spacing="0.12em">B · BUILTIN</text>
    <text x="60" y="23" text-anchor="middle" font-family="Noto Sans CJK KR" font-size="5.5" fill="#c45858" font-weight="700" letter-spacing="0.12em">G · GLOBAL</text>
    <text x="60" y="37" text-anchor="middle" font-family="Noto Sans CJK KR" font-size="5.3" fill="#c48b2c" font-weight="700" letter-spacing="0.1em">E · ENCLOSING</text>
    <text x="60" y="51" text-anchor="middle" font-family="Noto Sans CJK KR" font-size="5" fill="#3b9b6e" font-weight="700" letter-spacing="0.1em">L · LOCAL</text>
  </svg>

  <!-- 메인 타이포 -->
  <div class="book-cover-stage">
    <div class="book-cover-eyebrow">PYTHON · 공식 문서 · 4단계 학습</div>
    <h1 class="book-cover-title">
      <span class="title-py">Py</span><span class="title-why">Why</span>
    </h1>
    <div class="book-cover-rule"></div>
    <p class="book-cover-subtitle">
      공식 문서로 분해하는<br>파이썬 사고법
    </p>
    <p class="book-cover-tagline">컴퓨터는 어떻게 생각하는가</p>
  </div>

  <!-- 4단계 점 -->
  <div class="book-cover-foot">
    <table class="book-cover-levels-table" aria-label="4단계 학습 시스템">
      <tr>
        <td><span class="book-cover-level-dot dot-elem"></span></td>
        <td><span class="book-cover-level-dot dot-inter"></span></td>
        <td><span class="book-cover-level-dot dot-adv"></span></td>
        <td><span class="book-cover-level-dot dot-expert"></span></td>
      </tr>
      <tr>
        <td>초급</td>
        <td>중급</td>
        <td>고급</td>
        <td>전공자</td>
      </tr>
    </table>
  </div>

</div>
