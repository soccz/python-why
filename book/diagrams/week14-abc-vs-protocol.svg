<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">ABC vs Protocol — 명목적 서브타이핑 vs 구조적 서브타이핑</text>
  <text x="360" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">"혈통(상속)을 보는가, 능력(메서드)을 보는가"</text>

  <!-- 왼쪽: ABC (혈통) -->
  <rect x="40" y="60" width="320" height="240" rx="6" fill="#fdf2f2" stroke="#c45858" stroke-width="2"/>
  <text x="200" y="82" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="13" fill="#963434">ABC — 명목적 (Nominal)</text>
  <text x="200" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">"너는 반드시 내 자식이어야 한다"</text>

  <!-- ABC 부모 -->
  <rect x="130" y="115" width="140" height="50" rx="4" fill="#ffffff" stroke="#c45858"/>
  <text x="200" y="135" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="11" fill="#963434">class Animal(ABC)</text>
  <text x="200" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#706b66">@abstractmethod speak</text>

  <!-- 상속 화살표 -->
  <line x1="170" y1="175" x2="120" y2="210" stroke="#c45858" stroke-width="1.5" marker-end="url(#arrow14r)"/>
  <line x1="230" y1="175" x2="280" y2="210" stroke="#c45858" stroke-width="1.5" marker-end="url(#arrow14r)"/>

  <!-- Dog (자식) -->
  <rect x="60" y="215" width="120" height="40" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="120" y="232" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="10" fill="#267547">class Dog(Animal)</text>
  <text x="120" y="248" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">✅ 명시적 상속</text>

  <!-- Cat -->
  <rect x="220" y="215" width="120" height="40" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="280" y="232" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="10" fill="#267547">class Cat(Animal)</text>
  <text x="280" y="248" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">✅ 명시적 상속</text>

  <text x="200" y="280" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">상속 안 했으면 speak()가 있어도</text>
  <text x="200" y="294" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#963434">isinstance(obj, Animal) == False</text>

  <!-- 오른쪽: Protocol (능력) -->
  <rect x="400" y="60" width="280" height="240" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="2"/>
  <text x="540" y="82" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="13" fill="#4835a0">Protocol — 구조적 (Structural)</text>
  <text x="540" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">"네가 draw()만 가지고 있다면 너도 통과"</text>

  <!-- Protocol 정의 -->
  <rect x="450" y="115" width="180" height="50" rx="4" fill="#ffffff" stroke="#5a48c0"/>
  <text x="540" y="135" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="10" fill="#4835a0">class Drawable(Protocol)</text>
  <text x="540" y="155" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#706b66">def draw(self) -&gt; str: ...</text>

  <!-- 호환되는 클래스들 (상속 X) -->
  <rect x="420" y="190" width="100" height="50" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="470" y="208" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="10" fill="#267547">class Circle</text>
  <text x="470" y="222" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#706b66">def draw(self):</text>
  <text x="470" y="234" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#706b66">    return "○"</text>

  <rect x="540" y="190" width="120" height="50" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="600" y="208" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="10" fill="#267547">class Square</text>
  <text x="600" y="222" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#706b66">def draw(self):</text>
  <text x="600" y="234" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#706b66">    return "□"</text>

  <text x="540" y="260" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">Drawable을 상속하지 않았어도</text>
  <text x="540" y="274" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#4835a0" font-weight="700">render(Circle())  ✅ 통과</text>
  <text x="540" y="288" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">— Duck Typing의 공식화 (PEP 544)</text>

  <defs>
    <marker id="arrow14r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c45858"/></marker>
  </defs>
</svg>
