<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- PyListObject 구조 -->
        <text x="360" y="25" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">lst = [42, "hi", True, 3.14] — CPython 메모리 레이아웃</text>

        <!-- PyListObject 헤더 -->
        <rect x="40" y="60" width="240" height="120" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="2"/>
        <text x="160" y="80" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#4835a0">PyListObject</text>
        <line x1="40" y1="88" x2="280" y2="88" stroke="#5a48c0" stroke-width="0.5"/>
        <text x="60" y="108" font-family="JetBrains Mono" font-size="10" fill="#1a1410">ob_refcnt</text>
        <text x="250" y="108" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#706b66">: 1</text>
        <text x="60" y="125" font-family="JetBrains Mono" font-size="10" fill="#1a1410">ob_type</text>
        <text x="250" y="125" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#706b66">: &amp;PyList_Type</text>
        <text x="60" y="142" font-family="JetBrains Mono" font-size="10" fill="#1a1410">ob_size</text>
        <text x="250" y="142" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#706b66">: 4 (현재 항목 수)</text>
        <text x="60" y="159" font-family="JetBrains Mono" font-size="10" fill="#1a1410">allocated</text>
        <text x="250" y="159" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#706b66">: 8 (예약된 슬롯 수)</text>
        <text x="60" y="176" font-family="JetBrains Mono" font-size="10" fill="#c4724e" font-weight="700">ob_item</text>
        <text x="250" y="176" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="#706b66">→</text>

        <!-- ob_item 배열 -->
        <text x="500" y="55" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#706b66">ob_item (PyObject* 포인터 배열, C 배열)</text>
        <g font-family="JetBrains Mono" font-size="10">
          <rect x="320" y="65" width="50" height="30" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="345" y="84" text-anchor="middle" fill="#8e4f30">[0]</text>

          <rect x="370" y="65" width="50" height="30" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="395" y="84" text-anchor="middle" fill="#8e4f30">[1]</text>

          <rect x="420" y="65" width="50" height="30" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="445" y="84" text-anchor="middle" fill="#8e4f30">[2]</text>

          <rect x="470" y="65" width="50" height="30" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="495" y="84" text-anchor="middle" fill="#8e4f30">[3]</text>

          <!-- 빈 슬롯 (allocated 8 - size 4 = 4 빈 슬롯) -->
          <rect x="520" y="65" width="50" height="30" rx="3" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="545" y="84" text-anchor="middle" fill="#a8a29e">[4]</text>

          <rect x="570" y="65" width="50" height="30" rx="3" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="595" y="84" text-anchor="middle" fill="#a8a29e">[5]</text>

          <rect x="620" y="65" width="50" height="30" rx="3" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="645" y="84" text-anchor="middle" fill="#a8a29e">[6]</text>

          <rect x="670" y="65" width="40" height="30" rx="3" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="690" y="84" text-anchor="middle" fill="#a8a29e">[7]</text>
        </g>

        <text x="375" y="115" font-family="Noto Sans KR" font-size="9" fill="#a8a29e">↑ 사용 중 (4개)</text>
        <text x="595" y="115" font-family="Noto Sans KR" font-size="9" fill="#a8a29e">↑ 빈 슬롯 (over-allocation)</text>

        <!-- 화살표 from ob_item to array -->
        <line x1="270" y1="173" x2="320" y2="80" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-list)"/>

        <!-- 실제 객체들 -->
        <text x="360" y="220" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#706b66">각 슬롯이 가리키는 실제 PyObject (메모리 다른 곳)</text>

        <g>
          <rect x="320" y="235" width="50" height="40" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="345" y="252" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#267547">PyLong</text>
          <text x="345" y="268" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#1a1410" font-weight="700">42</text>

          <rect x="370" y="235" width="50" height="40" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="395" y="252" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#267547">PyStr</text>
          <text x="395" y="268" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410" font-weight="700">"hi"</text>

          <rect x="420" y="235" width="50" height="40" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="445" y="252" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#267547">PyBool</text>
          <text x="445" y="268" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410" font-weight="700">True</text>

          <rect x="470" y="235" width="50" height="40" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="495" y="252" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#267547">PyFloat</text>
          <text x="495" y="268" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410" font-weight="700">3.14</text>
        </g>

        <!-- 화살표 ob_item[i] → 객체 -->
        <line x1="345" y1="98" x2="345" y2="232" stroke="#3b9b6e" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="395" y1="98" x2="395" y2="232" stroke="#3b9b6e" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="445" y1="98" x2="445" y2="232" stroke="#3b9b6e" stroke-width="1" stroke-dasharray="3,3"/>
        <line x1="495" y1="98" x2="495" y2="232" stroke="#3b9b6e" stroke-width="1" stroke-dasharray="3,3"/>

        <text x="360" y="305" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#1a1410">
          lst[2] = ob_item[2]을 메모리에서 직접 인덱스 → <tspan font-weight="700" fill="#c4724e">O(1)</tspan>
        </text>

        <defs>
          <marker id="arr-list" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#c4724e"/>
          </marker>
        </defs>
      </svg>
