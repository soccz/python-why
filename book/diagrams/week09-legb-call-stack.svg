<svg width="660" height="360" viewBox="0 0 720 360" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">함수 — 이름은 어디서 찾고, 호출은 어떻게 쌓이는가</text>

  <!-- 왼쪽: LEGB 동심원 -->
  <text x="180" y="50" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#1a1410">LEGB Rule — 이름 탐색 순서</text>

  <!-- B (가장 바깥) -->
  <rect x="40" y="65" width="280" height="240" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="1.5"/>
  <text x="55" y="82" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#4835a0">B — Built-in (내장)</text>
  <text x="55" y="96" font-family="JetBrains Mono" font-size="9" fill="#706b66">print, len, int, range, ...</text>

  <!-- G -->
  <rect x="60" y="105" width="240" height="190" rx="6" fill="#fdf2f2" stroke="#c45858" stroke-width="1.5"/>
  <text x="75" y="122" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#963434">G — Global (모듈 전역)</text>
  <text x="75" y="136" font-family="JetBrains Mono" font-size="9" fill="#706b66">모듈 최상위에 정의된 이름</text>

  <!-- E -->
  <rect x="80" y="145" width="200" height="140" rx="6" fill="#fdf8ef" stroke="#c48b2c" stroke-width="1.5"/>
  <text x="95" y="162" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#8a5f0e">E — Enclosing (감싼 함수)</text>
  <text x="95" y="176" font-family="JetBrains Mono" font-size="9" fill="#706b66">중첩 함수의 바깥 함수</text>

  <!-- L -->
  <rect x="100" y="185" width="160" height="90" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
  <text x="115" y="202" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#267547">L — Local (지역)</text>
  <text x="115" y="216" font-family="JetBrains Mono" font-size="9" fill="#706b66">현재 함수 안의 이름</text>
  <text x="180" y="240" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#1a1410">def f(x):</text>
  <text x="180" y="254" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#1a1410">    y = 1</text>
  <text x="180" y="268" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#267547">x, y는 여기</text>

  <text x="180" y="320" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">파이썬은 이름을 L → E → G → B 순으로 찾는다</text>

  <!-- 오른쪽: Call Stack -->
  <text x="540" y="50" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#1a1410">Call Stack — factorial(3) 호출 흐름</text>

  <!-- 스택 프레임 (위에서부터: 가장 최근 호출) -->
  <rect x="400" y="70" width="280" height="40" rx="3" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
  <text x="540" y="85" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#267547" font-weight="700">factorial(1) → return 1</text>
  <text x="540" y="100" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">base case · n=1</text>

  <rect x="400" y="115" width="280" height="40" rx="3" fill="#fdf8ef" stroke="#c48b2c" stroke-width="1.5"/>
  <text x="540" y="130" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#8a5f0e" font-weight="700">factorial(2) → 2 * factorial(1)</text>
  <text x="540" y="145" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">대기 중 · n=2</text>

  <rect x="400" y="160" width="280" height="40" rx="3" fill="#fdf2f2" stroke="#c45858" stroke-width="1.5"/>
  <text x="540" y="175" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#963434" font-weight="700">factorial(3) → 3 * factorial(2)</text>
  <text x="540" y="190" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">대기 중 · n=3</text>

  <rect x="400" y="205" width="280" height="40" rx="3" fill="#1e1e2e"/>
  <text x="540" y="220" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#cdd6f4" font-weight="700">main()</text>
  <text x="540" y="234" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#a8a29e">최초 호출자</text>

  <!-- 화살표 -->
  <text x="380" y="92" font-family="Noto Sans KR" font-size="9" fill="#706b66">top</text>
  <text x="380" y="225" font-family="Noto Sans KR" font-size="9" fill="#706b66">bottom</text>
  <line x1="386" y1="80" x2="386" y2="220" stroke="#706b66" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 결과 -->
  <rect x="400" y="265" width="280" height="50" rx="4" fill="#faf7f2" stroke="#c4724e"/>
  <text x="540" y="283" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#c4724e">스택이 풀리며 결과 반환</text>
  <text x="540" y="299" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">1 → 2*1=2 → 3*2=6</text>
  <text x="540" y="312" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">sys.getrecursionlimit() = 1000 (기본)</text>
</svg>
