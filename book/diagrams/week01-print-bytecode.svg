<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">print("Hello") 한 줄 — CPython이 실제로 하는 일</text>
  <text x="360" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">소스 → 토큰 → AST → 바이트코드 → PVM → sys.stdout</text>

  <!-- 6단계 흐름 -->
  <g font-family="JetBrains Mono" font-size="10">
    <!-- 1: 소스 -->
    <rect x="20" y="70" width="100" height="50" rx="4" fill="#1e1e2e"/>
    <text x="70" y="95" text-anchor="middle" fill="#cdd6f4" font-weight="700">print("Hello")</text>
    <text x="70" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">1. 소스 코드</text>

    <!-- arrow -->
    <line x1="125" y1="95" x2="148" y2="95" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <!-- 2: 토크나이저 -->
    <rect x="150" y="70" width="100" height="50" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
    <text x="200" y="86" text-anchor="middle" fill="#267547" font-weight="700" font-size="9">NAME 'print'</text>
    <text x="200" y="100" text-anchor="middle" fill="#267547" font-size="9">OP '('</text>
    <text x="200" y="114" text-anchor="middle" fill="#267547" font-size="9">STRING ...</text>
    <text x="200" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">2. 토크나이저</text>

    <line x1="255" y1="95" x2="278" y2="95" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <!-- 3: PEG Parser → AST -->
    <rect x="280" y="70" width="100" height="50" rx="4" fill="#fdf8ef" stroke="#c48b2c"/>
    <text x="330" y="86" text-anchor="middle" fill="#8a5f0e" font-weight="700" font-size="9">Module(</text>
    <text x="330" y="100" text-anchor="middle" fill="#8a5f0e" font-size="9">Expr(Call(</text>
    <text x="330" y="114" text-anchor="middle" fill="#8a5f0e" font-size="9">Name(print))))</text>
    <text x="330" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">3. PEG → AST</text>

    <line x1="385" y1="95" x2="408" y2="95" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <!-- 4: Compiler → Bytecode -->
    <rect x="410" y="70" width="120" height="50" rx="4" fill="#fdf2f2" stroke="#c45858"/>
    <text x="470" y="84" text-anchor="middle" fill="#963434" font-size="8.5" font-weight="700">PUSH_NULL</text>
    <text x="470" y="96" text-anchor="middle" fill="#963434" font-size="8.5">LOAD_GLOBAL print</text>
    <text x="470" y="108" text-anchor="middle" fill="#963434" font-size="8.5">LOAD_CONST 'Hello'</text>
    <text x="470" y="118" text-anchor="middle" fill="#963434" font-size="8.5">CALL 1 / POP_TOP</text>
    <text x="470" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">4. 바이트코드</text>

    <line x1="535" y1="95" x2="558" y2="95" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <!-- 5: PVM -->
    <rect x="560" y="70" width="120" height="50" rx="4" fill="#f2f0fc" stroke="#5a48c0"/>
    <text x="620" y="92" text-anchor="middle" fill="#4835a0" font-weight="700">PVM</text>
    <text x="620" y="108" text-anchor="middle" fill="#4835a0" font-size="9">스택 머신 실행</text>
    <text x="620" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">5. PVM</text>
  </g>

  <!-- 6: builtin_print → sys.stdout → Layer Stack (하단) -->
  <g font-family="JetBrains Mono" font-size="9">
    <!-- 화살표 -->
    <line x1="620" y1="125" x2="620" y2="160" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="635" y="148" font-family="Noto Sans KR" font-size="8" fill="#706b66">CALL → builtin_print()</text>

    <!-- Layer stack -->
    <rect x="60" y="170" width="600" height="34" rx="3" fill="#fdf2f2" stroke="#c45858" stroke-width="0.8"/>
    <text x="80" y="190" fill="#963434" font-weight="700">builtin_print()</text>
    <text x="220" y="190" fill="#1a1410">→ PyFile_WriteObject(arg, file)</text>
    <text x="455" y="190" fill="#1a1410">→ PyObject_Str()</text>
    <text x="600" y="190" fill="#963434">→ tp_str</text>

    <line x1="360" y1="208" x2="360" y2="222" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <rect x="60" y="226" width="600" height="34" rx="3" fill="#fdf8ef" stroke="#c48b2c" stroke-width="0.8"/>
    <text x="80" y="246" fill="#8a5f0e" font-weight="700">sys.stdout.write("Hello\n")</text>
    <text x="320" y="246" fill="#1a1410">→ TextIOWrapper</text>
    <text x="475" y="246" fill="#1a1410">→ BufferedWriter</text>
    <text x="615" y="246" fill="#8a5f0e">→ FileIO</text>

    <line x1="360" y1="263" x2="360" y2="278" stroke="#706b66" stroke-width="1.5" marker-end="url(#a1)"/>

    <rect x="60" y="282" width="600" height="30" rx="3" fill="#1e1e2e"/>
    <text x="80" y="302" fill="#cdd6f4" font-weight="700">write(fd=1, buf="Hello\n", count=6)</text>
    <text x="350" y="302" fill="#a8a29e">→ OS 시스템콜 → 터미널 화면 "Hello"</text>
  </g>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#706b66"/></marker>
  </defs>
</svg>
