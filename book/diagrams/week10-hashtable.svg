<svg width="660" height="290" viewBox="0 0 720 290" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">d["지민"] = 90 — 해시 테이블의 작동 원리</text>

        <!-- Step 1: hash() -->
        <text x="80" y="60" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#1a1410">① hash()</text>
        <rect x="20" y="70" width="120" height="44" rx="6" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="80" y="92" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#1a1410" font-weight="700">"지민"</text>
        <text x="80" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">key (입력)</text>

        <line x1="140" y1="92" x2="180" y2="92" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-h)"/>
        <text x="160" y="84" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#c4724e">hash()</text>

        <rect x="180" y="70" width="170" height="44" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="1.5"/>
        <text x="265" y="92" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410" font-weight="700">8273619427183</text>
        <text x="265" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">정수 해시값 (큰 숫자)</text>

        <line x1="350" y1="92" x2="390" y2="92" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-h)"/>
        <text x="370" y="84" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#c4724e">% 8</text>

        <rect x="390" y="70" width="80" height="44" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
        <text x="430" y="92" text-anchor="middle" font-family="JetBrains Mono" font-size="16" fill="#1a1410" font-weight="700">3</text>
        <text x="430" y="106" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#267547">슬롯 번호</text>

        <text x="500" y="98" font-family="Noto Sans KR" font-size="10" fill="#706b66">→ 슬롯 [3]에 저장</text>

        <!-- Hash table slots -->
        <text x="360" y="155" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#1a1410">② 해시 테이블 (슬롯 8개)</text>

        <g font-family="JetBrains Mono" font-size="10">
          <!-- slot 0 -->
          <rect x="60" y="170" width="70" height="60" rx="4" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="95" y="186" text-anchor="middle" fill="#a8a29e" font-size="9">[0]</text>
          <text x="95" y="208" text-anchor="middle" fill="#a8a29e" font-size="9">(empty)</text>

          <!-- slot 1 -->
          <rect x="135" y="170" width="70" height="60" rx="4" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="170" y="186" text-anchor="middle" fill="#a8a29e" font-size="9">[1]</text>
          <text x="170" y="208" text-anchor="middle" fill="#a8a29e" font-size="9">(empty)</text>

          <!-- slot 2 -->
          <rect x="210" y="170" width="70" height="60" rx="4" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="245" y="186" text-anchor="middle" fill="#8e4f30" font-size="9" font-weight="700">[2]</text>
          <text x="245" y="203" text-anchor="middle" fill="#1a1410" font-weight="700" font-size="10">"수진"</text>
          <text x="245" y="218" text-anchor="middle" fill="#706b66" font-size="9">: 87</text>

          <!-- slot 3 -->
          <rect x="285" y="170" width="70" height="60" rx="4" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2.5"/>
          <text x="320" y="186" text-anchor="middle" fill="#267547" font-size="9" font-weight="700">[3]</text>
          <text x="320" y="203" text-anchor="middle" fill="#1a1410" font-weight="700" font-size="10">"지민"</text>
          <text x="320" y="218" text-anchor="middle" fill="#706b66" font-size="9">: 90</text>

          <!-- slot 4 -->
          <rect x="360" y="170" width="70" height="60" rx="4" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="395" y="186" text-anchor="middle" fill="#a8a29e" font-size="9">[4]</text>
          <text x="395" y="208" text-anchor="middle" fill="#a8a29e" font-size="9">(empty)</text>

          <!-- slot 5 -->
          <rect x="435" y="170" width="70" height="60" rx="4" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="470" y="186" text-anchor="middle" fill="#8e4f30" font-size="9" font-weight="700">[5]</text>
          <text x="470" y="203" text-anchor="middle" fill="#1a1410" font-weight="700" font-size="10">"하늘"</text>
          <text x="470" y="218" text-anchor="middle" fill="#706b66" font-size="9">: 95</text>

          <!-- slot 6 -->
          <rect x="510" y="170" width="70" height="60" rx="4" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="545" y="186" text-anchor="middle" fill="#a8a29e" font-size="9">[6]</text>
          <text x="545" y="208" text-anchor="middle" fill="#a8a29e" font-size="9">(empty)</text>

          <!-- slot 7 -->
          <rect x="585" y="170" width="70" height="60" rx="4" fill="#faf7f2" stroke="#e7e2db" stroke-width="1.5" stroke-dasharray="3,3"/>
          <text x="620" y="186" text-anchor="middle" fill="#a8a29e" font-size="9">[7]</text>
          <text x="620" y="208" text-anchor="middle" fill="#a8a29e" font-size="9">(empty)</text>
        </g>

        <text x="360" y="260" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#1a1410">
          d["지민"] 조회: hash("지민") % 8 = 3 → 슬롯 [3] <tspan font-weight="700" fill="#3b9b6e">직접 접근</tspan> → <tspan font-weight="700" fill="#c4724e">O(1)</tspan>
        </text>
        <text x="360" y="278" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">
          (충돌 시: probing 으로 다음 슬롯 탐색 — 실제 dict는 더 정교한 perturbation 사용)
        </text>

        <defs>
          <marker id="arr-h" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#c4724e"/>
          </marker>
        </defs>
      </svg>
