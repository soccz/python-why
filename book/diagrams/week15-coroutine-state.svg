<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">async/await — 코루틴은 어떻게 양보하고 재개되는가</text>
  <text x="360" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">await 지점에서 frame을 보존하고 이벤트 루프에 제어 양보 → I/O 완료 시 재개</text>

  <!-- 코루틴 1: Task A -->
  <rect x="40" y="60" width="200" height="240" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
  <text x="140" y="82" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="11" fill="#267547">async def task_A():</text>

  <g font-family="JetBrains Mono" font-size="9">
    <text x="50" y="105" fill="#1a1410">    print("A 시작")</text>
    <rect x="48" y="118" width="170" height="22" fill="#fdf3ec" stroke="#c4724e" stroke-width="1"/>
    <text x="60" y="133" fill="#c4724e" font-weight="700">    await sleep(2)</text>

    <text x="50" y="155" fill="#1a1410">    print("A 완료")</text>
    <text x="50" y="170" fill="#1a1410">    return "A"</text>
  </g>

  <text x="140" y="200" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">await에서:</text>
  <text x="140" y="215" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">1. cr_frame 보존</text>
  <text x="140" y="230" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">2. yield from sleep().__await__</text>
  <text x="140" y="245" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">3. Event Loop에 제어 반환</text>

  <text x="140" y="278" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#267547" font-weight="700">2초 후 재개</text>

  <!-- 화살표 (A → Loop) -->
  <line x1="245" y1="130" x2="278" y2="155" stroke="#3b9b6e" stroke-width="1.5" marker-end="url(#aC)"/>
  <text x="262" y="148" font-family="Noto Sans KR" font-size="9" fill="#267547">await</text>

  <!-- 가운데: Event Loop -->
  <ellipse cx="360" cy="180" rx="80" ry="60" fill="#fdf3ec" stroke="#c4724e" stroke-width="2.5"/>
  <text x="360" y="170" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#c4724e">Event Loop</text>
  <text x="360" y="186" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">단일 스레드</text>
  <text x="360" y="200" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#706b66">epoll/kqueue</text>
  <text x="360" y="214" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">대기 중인 코루틴 큐</text>

  <!-- 화살표 (Loop → B) -->
  <line x1="442" y1="155" x2="475" y2="130" stroke="#fdf8ef" stroke-width="2"/>
  <line x1="442" y1="155" x2="475" y2="130" stroke="#c48b2c" stroke-width="1.5" marker-end="url(#aC)"/>
  <text x="455" y="148" font-family="Noto Sans KR" font-size="9" fill="#8a5f0e">resume</text>

  <!-- 코루틴 2: Task B -->
  <rect x="480" y="60" width="200" height="240" rx="6" fill="#fdf8ef" stroke="#c48b2c" stroke-width="2"/>
  <text x="580" y="82" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="11" fill="#8a5f0e">async def task_B():</text>

  <g font-family="JetBrains Mono" font-size="9">
    <text x="490" y="105" fill="#1a1410">    print("B 시작")</text>
    <rect x="488" y="118" width="170" height="22" fill="#fdf3ec" stroke="#c4724e" stroke-width="1"/>
    <text x="500" y="133" fill="#c4724e" font-weight="700">    await sleep(1)</text>

    <text x="490" y="155" fill="#1a1410">    print("B 완료")</text>
    <text x="490" y="170" fill="#1a1410">    return "B"</text>
  </g>

  <text x="580" y="200" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">A가 sleep(2) 양보 중</text>
  <text x="580" y="215" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">→ 그 동안 B가 실행</text>
  <text x="580" y="230" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">→ 1초 후 B 완료</text>
  <text x="580" y="245" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">→ 1초 더 기다리면 A도 완료</text>

  <text x="580" y="278" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8a5f0e" font-weight="700">총 2초 (4초가 아닌)</text>

  <defs>
    <marker id="aC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="currentColor"/></marker>
  </defs>
</svg>
