<svg width="660" height="240" viewBox="0 0 720 240" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <text x="360" y="20" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">GIL — 한 번에 하나의 스레드만 Python 바이트코드 실행</text>

      <!-- GIL 토큰 (열쇠) -->
      <g transform="translate(330, 110)">
        <circle cx="30" cy="0" r="35" fill="#fdf3ec" stroke="#c4724e" stroke-width="2"/>
        <text x="30" y="-8" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#8e4f30" font-weight="700">GIL</text>
        <text x="30" y="8" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">(1개)</text>
      </g>

      <!-- Thread 1 — 실행 중 (열쇠 보유) -->
      <g transform="translate(40, 70)">
        <rect x="0" y="0" width="180" height="100" rx="8" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
        <text x="90" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#267547">Thread 1 </text>
        <text x="90" y="40" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#1a1410">실행 중 (GIL 보유)</text>
        <rect x="20" y="50" width="140" height="20" rx="3" fill="#3b9b6e" opacity="0.3"/>
        <text x="90" y="64" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">x = compute()</text>
        <text x="90" y="85" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#267547">바이트코드 실행 가능</text>
      </g>
      <line x1="220" y1="120" x2="320" y2="115" stroke="#3b9b6e" stroke-width="2" marker-end="url(#arr-g)"/>

      <!-- Thread 2 — 대기 -->
      <g transform="translate(500, 50)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="#fdf2f2" stroke="#c45858" stroke-width="2"/>
        <text x="90" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#963434">Thread 2 </text>
        <text x="90" y="40" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#963434">대기 중 (GIL 없음)</text>
        <text x="90" y="55" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">바이트코드 실행 불가</text>
      </g>
      <line x1="500" y1="80" x2="400" y2="100" stroke="#c45858" stroke-width="1.5" stroke-dasharray="3,3"/>

      <!-- Thread 3 — 대기 -->
      <g transform="translate(500, 130)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="#fdf2f2" stroke="#c45858" stroke-width="2"/>
        <text x="90" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#963434">Thread 3 </text>
        <text x="90" y="40" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#963434">대기 중 (GIL 없음)</text>
        <text x="90" y="55" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">바이트코드 실행 불가</text>
      </g>
      <line x1="500" y1="160" x2="400" y2="135" stroke="#c45858" stroke-width="1.5" stroke-dasharray="3,3"/>

      <text x="360" y="225" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#1a1410">
        5ms마다 GIL이 다른 스레드로 넘어감 (<tspan font-family="JetBrains Mono">sys.getswitchinterval() = 0.005</tspan>)
      </text>

      <defs>
        <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#3b9b6e"/>
        </marker>
      </defs>
    </svg>
