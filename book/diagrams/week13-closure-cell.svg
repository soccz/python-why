<svg width="660" height="340" viewBox="0 0 720 340" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">클로저 — 함수가 자기 탄생 환경을 어떻게 기억하는가</text>
  <text x="360" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">CPython 내부: 자유 변수(free variable)는 cell 객체에 박아둔다</text>

  <!-- 외부 함수 영역 -->
  <rect x="40" y="60" width="320" height="220" rx="6" fill="#fdf8ef" stroke="#c48b2c" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#8a5f0e">def make_counter():  ← 외부 함수</text>

  <!-- count 변수 (외부) -->
  <rect x="60" y="100" width="120" height="50" rx="4" fill="#ffffff" stroke="#c48b2c"/>
  <text x="120" y="118" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">count = 0</text>
  <text x="120" y="138" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">바깥 함수의 지역 변수</text>

  <!-- 내부 함수 -->
  <rect x="200" y="100" width="140" height="170" rx="4" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
  <text x="270" y="118" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#267547">def counter():</text>
  <text x="210" y="135" font-family="JetBrains Mono" font-size="9" fill="#1a1410">  nonlocal count</text>
  <text x="210" y="150" font-family="JetBrains Mono" font-size="9" fill="#1a1410">  count += 1</text>
  <text x="210" y="165" font-family="JetBrains Mono" font-size="9" fill="#1a1410">  return count</text>
  <text x="270" y="200" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">count는 자유 변수</text>
  <text x="270" y="215" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">(여기서 정의 X,</text>
  <text x="270" y="230" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">바깥에서 옴)</text>

  <!-- 화살표: 자유 변수 참조 -->
  <line x1="180" y1="125" x2="200" y2="125" stroke="#3b9b6e" stroke-width="1.5" marker-end="url(#arrow13)"/>

  <text x="200" y="305" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">make_counter() 가 끝나도 count는 살아있다 — counter가 가지고 다닌다</text>

  <!-- 오른쪽: 반환된 함수의 내부 -->
  <rect x="400" y="60" width="280" height="220" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="2"/>
  <text x="540" y="80" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#4835a0">반환된 함수 객체 (PyFunctionObject)</text>

  <!-- __closure__ 박스 -->
  <text x="420" y="105" font-family="JetBrains Mono" font-size="10" fill="#1a1410">counter.__closure__ = (cell, )</text>

  <!-- cell 객체 -->
  <rect x="500" y="120" width="160" height="60" rx="4" fill="#ffffff" stroke="#5a48c0" stroke-width="1.5"/>
  <text x="580" y="140" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="10" fill="#4835a0">PyCellObject</text>
  <text x="580" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410">cell_contents = 0</text>
  <text x="580" y="172" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">힙(heap)에 할당</text>

  <text x="420" y="205" font-family="JetBrains Mono" font-size="10" fill="#1a1410">counter.__code__.co_freevars</text>
  <text x="420" y="222" font-family="JetBrains Mono" font-size="10" fill="#963434">  = ('count',)</text>

  <text x="420" y="250" font-family="Noto Sans KR" font-size="10" fill="#706b66">바이트코드: LOAD_DEREF / STORE_DEREF</text>
  <text x="420" y="265" font-family="Noto Sans KR" font-size="9" fill="#706b66">→ cell을 읽고 쓰는 전용 명령어</text>

  <!-- 가운데 화살표 -->
  <path d="M 340 170 L 395 170" stroke="#c4724e" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow13o)"/>
  <text x="367" y="160" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#c4724e" font-weight="700">return</text>

  <!-- 하단: c1, c2 독립성 -->
  <rect x="40" y="295" width="640" height="40" rx="4" fill="#1e1e2e"/>
  <text x="50" y="315" font-family="JetBrains Mono" font-size="10" fill="#cdd6f4">c1 = make_counter(); c2 = make_counter()  →  c1과 c2는 각자 다른 cell을 가진다</text>
  <text x="50" y="328" font-family="JetBrains Mono" font-size="9" fill="#a8a29e">c1() c1() c1()  # 1, 2, 3       c2()  # 1 (독립)</text>

  <defs>
    <marker id="arrow13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3b9b6e"/></marker>
    <marker id="arrow13o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c4724e"/></marker>
  </defs>
</svg>
