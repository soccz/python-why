<svg width="660" height="280" viewBox="0 0 720 280" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <text x="360" y="20" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">asyncio 이벤트 루프 — 단일 스레드 동시성</text>

        <!-- 이벤트 루프 (중앙 원) -->
        <circle cx="360" cy="140" r="65" fill="#fdf3ec" stroke="#c4724e" stroke-width="2.5"/>
        <text x="360" y="130" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="13" fill="#8e4f30">Event Loop</text>
        <text x="360" y="148" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">(단일 스레드)</text>
        <text x="360" y="165" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">epoll/kqueue 대기</text>

        <!-- Task A: 실행 중 -->
        <g transform="translate(40, 50)">
          <rect x="0" y="0" width="170" height="55" rx="8" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="85" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#267547">Task A — 실행 중</text>
          <text x="85" y="34" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">data = await fetch(url)</text>
          <text x="85" y="48" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#267547">↓ await에서 양보</text>
        </g>
        <line x1="210" y1="78" x2="295" y2="120" stroke="#3b9b6e" stroke-width="1.5" stroke-dasharray="3,3"/>

        <!-- Task B: I/O 대기 -->
        <g transform="translate(40, 130)">
          <rect x="0" y="0" width="170" height="55" rx="8" fill="#fef9ef" stroke="#d4930c" stroke-width="1.5"/>
          <text x="85" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#7a5408">Task B — I/O 대기</text>
          <text x="85" y="34" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">await db.query()</text>
          <text x="85" y="48" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#7a5408">응답 대기</text>
        </g>
        <line x1="210" y1="158" x2="295" y2="143" stroke="#d4930c" stroke-width="1.5" stroke-dasharray="3,3"/>

        <!-- Task C: 준비됨 -->
        <g transform="translate(40, 210)">
          <rect x="0" y="0" width="170" height="50" rx="8" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
          <text x="85" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#267547">Task C — 준비됨</text>
          <text x="85" y="34" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#267547">↑ 콜백 실행 대기열</text>
        </g>
        <line x1="210" y1="235" x2="305" y2="170" stroke="#3b9b6e" stroke-width="1.5" stroke-dasharray="3,3"/>

        <!-- 오른쪽: I/O 완료 알림 -->
        <g transform="translate(510, 50)">
          <rect x="0" y="0" width="180" height="60" rx="8" fill="#f5f0ff" stroke="#7c5cbf" stroke-width="1.5"/>
          <text x="90" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#4a2d82">OS 알림</text>
          <text x="90" y="34" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#1a1410">socket fd=5 데이터 도착</text>
          <text x="90" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">(epoll/kqueue 이벤트)</text>
        </g>
        <line x1="510" y1="80" x2="425" y2="120" stroke="#7c5cbf" stroke-width="1.5" marker-end="url(#arr-e)"/>

        <!-- 콜백 큐 -->
        <g transform="translate(510, 130)">
          <rect x="0" y="0" width="180" height="60" rx="8" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
          <text x="90" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#8e4f30">콜백 큐 (ready_queue)</text>
          <text x="90" y="34" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">[Task A.resume,</text>
          <text x="90" y="48" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">Task C.start, ...]</text>
        </g>
        <line x1="510" y1="160" x2="425" y2="143" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-e)"/>

        <!-- 타이머 -->
        <g transform="translate(510, 210)">
          <rect x="0" y="0" width="180" height="50" rx="8" fill="#fef2f3" stroke="#d44058" stroke-width="1.5"/>
          <text x="90" y="18" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#8e1f34">스케줄된 타이머</text>
          <text x="90" y="36" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#1a1410">asyncio.sleep(1)</text>
        </g>
        <line x1="510" y1="235" x2="415" y2="170" stroke="#d44058" stroke-width="1.5" marker-end="url(#arr-e)"/>

        <defs>
          <marker id="arr-e" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#706b66"/>
          </marker>
        </defs>
      </svg>
