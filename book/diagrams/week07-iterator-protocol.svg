<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">for 루프 안에서 일어나는 일 — Iterator Protocol</text>
  <text x="360" y="42" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">for x in lst: 는 iter(lst)와 next()의 syntactic sugar</text>

  <!-- Iterable -->
  <rect x="40" y="80" width="180" height="100" rx="6" fill="#fdf8ef" stroke="#c48b2c" stroke-width="2"/>
  <text x="130" y="103" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#8a5f0e">Iterable (이터러블)</text>
  <text x="130" y="121" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">__iter__()를 가진 객체</text>
  <text x="130" y="143" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">[1, 2, 3]</text>
  <text x="130" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">"hello"</text>
  <text x="130" y="173" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">range(10)</text>

  <!-- 화살표: iter() -->
  <line x1="220" y1="130" x2="290" y2="130" stroke="#c4724e" stroke-width="2" marker-end="url(#arrow7)"/>
  <text x="255" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#c4724e" font-weight="700">iter()</text>
  <text x="255" y="148" text-anchor="middle" font-family="Noto Sans KR" font-size="8" fill="#706b66">__iter__() 호출</text>

  <!-- Iterator -->
  <rect x="295" y="80" width="180" height="100" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="2"/>
  <text x="385" y="103" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="12" fill="#4835a0">Iterator (이터레이터)</text>
  <text x="385" y="121" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">__next__() + 상태(state)</text>
  <text x="385" y="143" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">list_iterator</text>
  <text x="385" y="158" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">str_iterator</text>
  <text x="385" y="173" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">range_iterator</text>

  <!-- 화살표: next() 반복 -->
  <path d="M 540 105 Q 600 90 600 130 Q 600 170 540 155" fill="none" stroke="#963434" stroke-width="2" marker-end="url(#arrow7)"/>
  <text x="610" y="135" font-family="JetBrains Mono" font-size="11" fill="#963434" font-weight="700">next()</text>
  <text x="610" y="150" font-family="Noto Sans KR" font-size="8" fill="#706b66">반복 호출</text>

  <!-- 값 출력 -->
  <line x1="475" y1="130" x2="535" y2="130" stroke="#3b9b6e" stroke-width="2" marker-end="url(#arrow7)"/>

  <rect x="540" y="80" width="60" height="34" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="570" y="102" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#267547" font-weight="700">1</text>
  <rect x="540" y="120" width="60" height="34" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="570" y="142" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#267547" font-weight="700">2</text>
  <rect x="540" y="160" width="60" height="34" rx="4" fill="#f0f9f4" stroke="#3b9b6e"/>
  <text x="570" y="182" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#267547" font-weight="700">3</text>

  <!-- StopIteration -->
  <rect x="295" y="200" width="180" height="40" rx="4" fill="#fdf2f2" stroke="#c45858" stroke-width="1.5"/>
  <text x="385" y="223" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="11" fill="#963434">StopIteration 예외</text>
  <text x="385" y="237" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">→ for 루프가 잡아서 정상 종료</text>

  <line x1="385" y1="180" x2="385" y2="200" stroke="#963434" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow7)"/>

  <!-- De-sugaring 박스 -->
  <rect x="40" y="255" width="630" height="50" rx="4" fill="#1e1e2e"/>
  <text x="50" y="273" font-family="JetBrains Mono" font-size="10" fill="#706b66"># for x in [1, 2, 3]: print(x)  ← 이 한 줄을 파이썬은 이렇게 풀어낸다</text>
  <text x="50" y="290" font-family="JetBrains Mono" font-size="10" fill="#cdd6f4">it = iter([1, 2, 3])    # __iter__ 호출 → list_iterator 생성</text>
  <text x="50" y="302" font-family="JetBrains Mono" font-size="10" fill="#cdd6f4">while True: try: x = next(it); print(x)  except StopIteration: break</text>

  <defs>
    <marker id="arrow7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>
</svg>
