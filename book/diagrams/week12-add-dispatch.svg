<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <text x="360" y="22" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="14" fill="#1a1410">a + b — Python 내부 디스패치 흐름</text>

        <!-- 사용자 코드 -->
        <rect x="290" y="40" width="140" height="40" rx="6" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="360" y="58" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">우리가 쓴 코드</text>
        <text x="360" y="74" text-anchor="middle" font-family="JetBrains Mono" font-size="13" fill="#1a1410" font-weight="700">a + b</text>

        <line x1="360" y1="80" x2="360" y2="100" stroke="#706b66" stroke-width="1.5" marker-end="url(#arr-d)"/>

        <!-- 인터프리터: a.__add__(b) -->
        <rect x="240" y="100" width="240" height="50" rx="6" fill="#f2f0fc" stroke="#5a48c0" stroke-width="1.5"/>
        <text x="360" y="118" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">Python 인터프리터가 호출</text>
        <text x="360" y="138" text-anchor="middle" font-family="JetBrains Mono" font-size="12" fill="#1a1410" font-weight="700">a.__add__(b)</text>

        <line x1="360" y1="150" x2="360" y2="170" stroke="#706b66" stroke-width="1.5" marker-end="url(#arr-d)"/>

        <!-- type(a) 슬롯 조회 -->
        <rect x="200" y="170" width="320" height="55" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
        <text x="360" y="188" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#706b66">CPython이 타입 객체에서 슬롯 조회</text>
        <text x="360" y="208" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#1a1410" font-weight="700">type(a)-&gt;tp_as_number-&gt;nb_add</text>
        <text x="360" y="220" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">(C 함수 포인터 직접 호출 — 빠름)</text>

        <!-- 가지치기: 성공 vs 실패 -->
        <line x1="280" y1="225" x2="180" y2="245" stroke="#3b9b6e" stroke-width="1.5" marker-end="url(#arr-d)"/>
        <line x1="440" y1="225" x2="540" y2="245" stroke="#c45858" stroke-width="1.5" marker-end="url(#arr-d-r)"/>

        <text x="220" y="237" font-family="Noto Sans KR" font-size="9" fill="#267547">성공</text>
        <text x="490" y="237" font-family="Noto Sans KR" font-size="9" fill="#963434">실패 (NotImplemented)</text>

        <!-- 성공 분기 -->
        <rect x="40" y="245" width="280" height="60" rx="6" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="1.5"/>
        <text x="180" y="263" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#267547" font-weight="700">결과 반환 </text>
        <text x="180" y="280" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">return a.__add__(b)</text>
        <text x="180" y="295" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">예: 3 + 4 = 7</text>

        <!-- 실패 분기 -->
        <rect x="400" y="245" width="280" height="60" rx="6" fill="#fdf2f2" stroke="#c45858" stroke-width="1.5"/>
        <text x="540" y="263" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#963434" font-weight="700">b.__radd__(a) 시도 (반사 연산)</text>
        <text x="540" y="280" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#1a1410">없으면: TypeError</text>
        <text x="540" y="295" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">예: 5 + Currency(100) → __radd__</text>

        <defs>
          <marker id="arr-d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#706b66"/>
          </marker>
          <marker id="arr-d-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#c45858"/>
          </marker>
        </defs>
      </svg>
