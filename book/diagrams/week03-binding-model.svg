<svg width="660" height="320" viewBox="0 0 720 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <!-- 상자 모델 (왼쪽) -->
        <text x="180" y="30" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="15" fill="#1a1410">상자 모델 (다른 언어)</text>
        <text x="180" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#706b66">"x = 1"은 상자 x에 1을 넣는 것</text>

        <!-- 박스 x -->
        <rect x="60" y="80" width="100" height="80" rx="6" fill="#fef2f2" stroke="#c45858" stroke-width="2"/>
        <text x="110" y="105" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">x</text>
        <text x="110" y="135" text-anchor="middle" font-family="JetBrains Mono" font-size="20" fill="#c45858" font-weight="700">1</text>

        <!-- 박스 y (복사) -->
        <rect x="200" y="80" width="100" height="80" rx="6" fill="#fef2f2" stroke="#c45858" stroke-width="2"/>
        <text x="250" y="105" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">y</text>
        <text x="250" y="135" text-anchor="middle" font-family="JetBrains Mono" font-size="20" fill="#c45858" font-weight="700">1</text>

        <!-- y = x 화살표 -->
        <path d="M 165 120 L 195 120" stroke="#706b66" stroke-width="1.5" marker-end="url(#arr-l)" fill="none"/>
        <text x="180" y="113" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">y = x</text>
        <text x="180" y="178" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#963434">값이 복사됨 → 독립된 두 값</text>

        <!-- x = 2 -->
        <text x="110" y="210" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#1a1410">x = 2 후</text>
        <rect x="60" y="220" width="100" height="60" rx="6" fill="#fef2f2" stroke="#c45858" stroke-width="2"/>
        <text x="110" y="245" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">x</text>
        <text x="110" y="270" text-anchor="middle" font-family="JetBrains Mono" font-size="18" fill="#c45858" font-weight="700">2</text>

        <text x="250" y="210" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#1a1410">y는 그대로</text>
        <rect x="200" y="220" width="100" height="60" rx="6" fill="#fef2f2" stroke="#c45858" stroke-width="2"/>
        <text x="250" y="245" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">y</text>
        <text x="250" y="270" text-anchor="middle" font-family="JetBrains Mono" font-size="18" fill="#c45858" font-weight="700">1</text>

        <!-- 구분선 -->
        <line x1="370" y1="20" x2="370" y2="300" stroke="#e7e2db" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- 이름표 모델 (오른쪽) -->
        <text x="540" y="30" text-anchor="middle" font-family="Noto Sans KR" font-weight="700" font-size="15" fill="#1a1410">이름표 모델 (Python)</text>
        <text x="540" y="50" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#706b66">"x = 1"은 이름표 x를 객체 1에 붙이는 것</text>

        <!-- 객체 1 -->
        <circle cx="540" cy="120" r="34" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
        <text x="540" y="115" text-anchor="middle" font-family="JetBrains Mono" font-size="18" fill="#1a1410" font-weight="700">1</text>
        <text x="540" y="135" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">int 객체</text>

        <!-- 이름표 x, y -->
        <rect x="430" y="100" width="50" height="20" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="455" y="114" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#8e4f30" font-weight="700">x</text>
        <line x1="480" y1="110" x2="510" y2="115" stroke="#c4724e" stroke-width="1.5"/>

        <rect x="430" y="130" width="50" height="20" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="455" y="144" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#8e4f30" font-weight="700">y</text>
        <line x1="480" y1="140" x2="510" y2="130" stroke="#c4724e" stroke-width="1.5"/>

        <text x="540" y="178" text-anchor="middle" font-family="Noto Sans KR" font-size="10" fill="#267547">두 이름표가 같은 객체를 가리킴</text>

        <!-- x = 2 후 -->
        <text x="540" y="210" text-anchor="middle" font-family="Noto Sans KR" font-size="11" fill="#1a1410">x = 2 후</text>

        <!-- 객체 1 (y가 가리킴) -->
        <circle cx="500" cy="260" r="28" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
        <text x="500" y="265" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">1</text>

        <!-- 객체 2 (x가 가리킴) -->
        <circle cx="640" cy="260" r="28" fill="#f0f9f4" stroke="#3b9b6e" stroke-width="2"/>
        <text x="640" y="265" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#1a1410" font-weight="700">2</text>

        <!-- 이름표 y → 1 -->
        <rect x="380" y="250" width="40" height="18" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="400" y="263" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#8e4f30" font-weight="700">y</text>
        <line x1="420" y1="259" x2="472" y2="259" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-r)"/>

        <!-- 이름표 x → 2 -->
        <rect x="555" y="220" width="40" height="18" rx="3" fill="#fdf3ec" stroke="#c4724e" stroke-width="1.5"/>
        <text x="575" y="233" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#8e4f30" font-weight="700">x</text>
        <line x1="595" y1="232" x2="618" y2="248" stroke="#c4724e" stroke-width="1.5" marker-end="url(#arr-r)"/>

        <text x="540" y="305" text-anchor="middle" font-family="Noto Sans KR" font-size="9" fill="#706b66">x 이름표만 새 객체로 옮김 — y는 그대로</text>

        <!-- arrow markers -->
        <defs>
          <marker id="arr-l" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#706b66"/>
          </marker>
          <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#c4724e"/>
          </marker>
        </defs>
      </svg>
